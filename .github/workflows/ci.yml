name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  test-cli:
    name: Test CLI (Node ${{ matrix.node }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        node: ['18.18', '20.x', '22.x']
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build -w packages/cli

      - name: Typecheck
        run: npm run typecheck -w packages/cli

      - name: Test
        run: npm test -w packages/cli

  test-template:
    name: Validate web template
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build runtime packages
        run: npm run build -w packages/ui -w packages/db -w packages/auth -w packages/ai -w packages/api

      - name: Typecheck template
        working-directory: templates/web
        run: npx tsc --noEmit
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb
          BETTER_AUTH_SECRET: test-secret-for-ci-only-not-real

      - name: Build template
        working-directory: templates/web
        run: npx next build
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb
          BETTER_AUTH_SECRET: test-secret-for-ci-only-not-real
          SKIP_ENV_VALIDATION: true

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  publish:
    name: Publish to npm
    needs: [test-cli, test-template, lint]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build -w packages/cli -w packages/ui -w packages/db -w packages/auth -w packages/ai -w packages/api

      - name: Publish create-pkstack
        run: npm publish --access public -w packages/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @pkstack/config
        run: npm publish --access public -w packages/config
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @pkstack/ui
        run: npm publish --access public -w packages/ui
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @pkstack/db
        run: npm publish --access public -w packages/db
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @pkstack/auth
        run: npm publish --access public -w packages/auth
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @pkstack/ai
        run: npm publish --access public -w packages/ai
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @pkstack/api
        run: npm publish --access public -w packages/api
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
